<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Profesional</title>
    
    <!-- Cargar Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Enlazar CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Encabezado fijo con buscador y carrito -->
    <div class="header-fijo">
        <input id="busqueda" type="text" placeholder="Buscar por nombre, descripción o categoría...">
        <select id="filtroCategoria">
            <option value="">Todas las categorías</option>
        </select>
        <button id="btnCarrito">🛒 <span id="contador">0</span></button>
    </div>

    <!-- Listado de productos -->
    <h1>Catálogo de Productos</h1>
    <div id="productos" class="grid"></div>

    <!-- Panel lateral del Carrito -->
    <div id="carrito" class="carrito-panel">
        <h2 id="numCot"></h2>

        <div class="cliente">
            <input id="nombreCliente" type="text" placeholder="Nombre">
            <input id="telefonoCliente" type="text" placeholder="Teléfono">
            <textarea id="observacionesCliente" placeholder="Dirección / observaciones" rows="3"></textarea>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cant.</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="detalle-carrito"></tbody>
        </table>

        <div class="totales">
            <p>Subtotal: <span id="subtotal">$0</span></p>
            <p>IVA (19%): <span id="iva">$0</span></p>
            <h3>Total: <span id="total">$0</span></h3>
        </div>

        <div class="botones">
            <button class="btn-success" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
            <button onclick="window.print()">Imprimir PDF</button>
            <button class="btn-danger" onclick="vaciarCarrito()">Vaciar</button>
            <button class="btn-cerrar" onclick="toggleCarrito()">Cerrar</button>
        </div>
    </div>

    <!-- Notificación Toast -->
    <div id="toast" class="toast"></div>
    
    <!-- Enlazar JavaScript -->
    <script src="js/app.js"></script>
    
</body>
</html>
